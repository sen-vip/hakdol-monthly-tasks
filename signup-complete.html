<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입 확인 완료 · 학돌 월별필수업무</title>
  <meta name="description" content="학돌 월별필수업무 회원가입 이메일 인증 완료 페이지" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --ink:#1f2a44;
      --muted:#64748b;
      --line:#dbe3ef;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --soft-blue:#eaf2ff;
      --radius:24px;
      --shadow:0 22px 60px rgba(31,42,68,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.10), transparent 34%),
        linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
      color:var(--ink);
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      line-height:1.55;
    }
    .complete-card{
      width:min(520px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:34px 30px;
      text-align:center;
    }
    .icon{
      width:64px;
      height:64px;
      display:inline-grid;
      place-items:center;
      border-radius:22px;
      background:var(--soft-blue);
      border:1px solid #bfdbfe;
      font-size:34px;
      margin-bottom:16px;
    }
    h1{
      margin:0;
      font-size:28px;
      letter-spacing:-.05em;
      color:#172033;
    }
    p{margin:12px 0 0;color:var(--muted);font-size:15px}
    .status{
      margin:20px auto 0;
      padding:11px 14px;
      border-radius:16px;
      background:#f8fbff;
      border:1px solid #e2eaf4;
      color:#334155;
      font-size:14px;
      text-align:left;
    }
    .status strong{display:block;color:#172033;margin-bottom:2px}
    .actions{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:24px;
    }
    a.button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 18px;
      border-radius:14px;
      text-decoration:none;
      font-weight:800;
      border:1px solid transparent;
    }
    a.primary{background:var(--blue);color:#fff;box-shadow:0 10px 24px rgba(37,99,235,.18)}
    a.primary:hover{background:var(--blue-dark)}
    a.ghost{background:#fff;color:#334155;border-color:var(--line)}
    .small-note{font-size:12.5px;color:#94a3b8;margin-top:18px}
    @media(max-width:520px){.complete-card{padding:28px 20px;border-radius:20px}h1{font-size:24px}.actions{display:grid}.actions a{width:100%}}
  </style>
</head>
<body>
  <main class="complete-card" aria-live="polite">
    <div class="icon" aria-hidden="true">✅</div>
    <h1 id="pageTitle">가입 확인을 처리하고 있어요</h1>
    <p id="pageMessage">잠시만 기다려 주세요. 이메일 인증 정보를 확인하는 중입니다.</p>
    <div class="status" id="statusBox">
      <strong>처리 중</strong>
      Supabase 인증 링크를 확인하고 있어요.
    </div>
    <div class="actions">
      <a class="button primary" href="./">학돌 월별필수업무로 돌아가기</a>
      <a class="button ghost" href="./">로그인 화면으로 이동</a>
    </div>
    <p class="small-note">인증이 완료된 뒤에도 로그인 상태가 바로 보이지 않으면 메인 화면에서 한 번 더 로그인해 주세요.</p>
  </main>

  <script>
    const CONFIG = window.HAKDOL_SUPABASE_CONFIG || { url: '', anonKey: '' };
    const HAS_SUPABASE = Boolean(CONFIG.url && CONFIG.anonKey && window.supabase);
    const titleEl = document.getElementById('pageTitle');
    const messageEl = document.getElementById('pageMessage');
    const statusEl = document.getElementById('statusBox');

    function setStatus(kind, heading, body) {
      statusEl.innerHTML = `<strong>${heading}</strong>${body}`;
      statusEl.dataset.status = kind;
    }

    function cleanUrl() {
      if (!window.history.replaceState) return;
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    async function completeSignup() {
      if (!HAS_SUPABASE) {
        titleEl.textContent = '로그인 저장 설정이 필요해요';
        messageEl.textContent = 'supabase-config.js 설정을 확인한 뒤 다시 시도해 주세요.';
        setStatus('error', '설정 확인 필요', 'Supabase URL 또는 anon key를 찾지 못했어요.');
        return;
      }

      const client = window.supabase.createClient(CONFIG.url, CONFIG.anonKey);
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');

      try {
        if (code) {
          const { error } = await client.auth.exchangeCodeForSession(code);
          if (error) throw error;
        }

        const { data, error } = await client.auth.getSession();
        if (error) throw error;

        titleEl.textContent = '가입 확인이 완료되었어요 🎉';
        messageEl.textContent = '이제 학돌 월별필수업무에서 내 학교 설정과 완료 체크를 저장할 수 있어요.';

        if (data.session?.user?.email) {
          setStatus('success', '인증 완료', `${data.session.user.email} 계정 확인이 완료되었어요. 메인 화면으로 돌아가 로그인 상태를 확인해 주세요.`);
        } else {
          setStatus('success', '인증 확인 완료', '메인 화면으로 돌아가 로그인해 주세요. 이미 로그인되어 있으면 학교 설정과 완료 체크가 계정에 저장됩니다.');
        }
        cleanUrl();
      } catch (error) {
        titleEl.textContent = '인증 확인 중 문제가 발생했어요';
        messageEl.textContent = '인증 링크가 만료되었거나 이미 사용된 링크일 수 있어요. 메인 화면에서 다시 로그인하거나 회원가입을 시도해 주세요.';
        setStatus('error', '확인 필요', error?.message || '알 수 없는 인증 오류가 발생했어요.');
      }
    }

    completeSignup();
  </script>
</body>
</html>
